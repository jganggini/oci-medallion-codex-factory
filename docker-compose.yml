services:
  dev-base:
    build:
      context: .
      dockerfile: docker/dev-base.Dockerfile
    image: oci-medallion-codex-factory/dev-base:latest
    pull_policy: never
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      HOST_REPO_ROOT: /workspace
    command: ["sleep", "infinity"]
    tty: true

  oci-runner:
    build:
      context: .
      dockerfile: docker/oci-runner.Dockerfile
    image: oci-medallion-codex-factory/oci-runner:latest
    pull_policy: never
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ./.local/oci:/mnt/oci
      - ./.local/autonomous/wallets:/mnt/wallets
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OCI_CLI_CONFIG_FILE: /mnt/oci/config
      OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
      HOST_REPO_ROOT: /workspace
    command: ["sleep", "infinity"]
    tty: true

  dataflow-packager:
    image: ${DATAFLOW_DEPENDENCY_PACKAGER_IMAGE:-phx.ocir.io/oracle/dataflow/dependency-packager:latest}
    working_dir: /opt/dataflow
    volumes:
      - ./:/workspace
      - ./workspace/generated:/opt/dataflow
    tty: true

  dataflow-local:
    build:
      context: .
      dockerfile: docker/dataflow-local-runtime.Dockerfile
    image: oci-medallion-codex-factory/dataflow-local:latest
    pull_policy: never
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - ./.local/oci:/mnt/oci
      - ./.local/autonomous/wallets:/mnt/wallets
    environment:
      OCI_CLI_CONFIG_FILE: /mnt/oci/config
    tty: true
