servers:
  - name: oci-iam-mcp
    runtime: python
    purpose: Compartments, groups, dynamic groups y policies
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/iam/
    expected_tools:
      - create_compartment
      - create_group
      - create_policy
      - export_iam_manifest

  - name: oci-network-mcp
    runtime: python
    purpose: VCN, subredes, NSGs, gateways, tablas de ruta y private endpoints
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/network/
    expected_tools:
      - create_vcn
      - create_subnet
      - create_nsg
      - create_route_table
      - export_network_manifest

  - name: oci-object-storage-mcp
    runtime: python
    purpose: Buckets landing, bronze, silver y manifests operativos de Object Storage
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/buckets/
    expected_tools:
      - create_bucket
      - upload_object
      - sync_bucket_manifest

  - name: oci-resource-manager-mcp
    runtime: python
    purpose: Provisioning de stacks OCI con Terraform compatible
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/reports/
    expected_tools:
      - create_stack
      - plan_stack
      - apply_stack
      - export_stack_report

  - name: oci-data-flow-mcp
    runtime: python
    purpose: Apps, updates, runs, empaquetado, reportes y evidencias de Data Flow
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/data_flow/
    expected_tools:
      - package_dependencies
      - validate_archive
      - create_application
      - update_application
      - run_application
      - collect_run_report

  - name: oci-data-integration-mcp
    runtime: python
    purpose: Workspaces, proyectos, folders, tasks, pipelines y reportes de task runs DI
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/data_integration/
    expected_tools:
      - create_workspace
      - create_project
      - create_folder
      - create_task_from_dataflow
      - create_pipeline
      - collect_task_run_report

  - name: oci-autonomous-database-mcp
    runtime: python
    purpose: ADB, control plane medallion, creacion de usuarios, ejecucion SQL con wallet y carga de objetos Gold
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/autonomous_database/
    expected_tools:
      - create_adb_definition
      - bootstrap_control_plane
      - bootstrap_schema
      - create_database_user
      - apply_sql
      - register_checkpoint
      - create_reprocess_request
      - load_gold_object

  - name: oci-data-quality-mcp
    runtime: python
    purpose: Contratos de calidad por run y slice, reconciliacion bucket vs ADB y gates de migracion
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/quality/
    expected_tools:
      - profile_bucket_data
      - run_contract
      - gate_migration

  - name: oci-data-catalog-mcp
    runtime: python
    purpose: Data Catalog, private endpoints, assets, harvests y publicacion de lineage OpenLineage
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/data_catalog/
    expected_tools:
      - create_catalog
      - create_private_endpoint
      - create_data_asset
      - create_connection
      - create_harvest_job_definition
      - run_harvest_job
      - sync_di_lineage
      - import_openlineage
      - collect_lineage_report

  - name: oci-vault-mcp
    runtime: python
    purpose: Vault, keys, secrets y referencias redacted
    mirror_outputs:
      - workspace/oci-mirror/<env>/<compartment>/vault/
    expected_tools:
      - create_vault
      - create_secret
      - rotate_secret_reference
      - export_vault_manifest

  - name: migration-intake-mcp
    runtime: python
    purpose: Indexar insumos de migracion y validar readiness
    mirror_outputs:
      - workspace/migration-input/<project_id>/_inventory/
    expected_tools:
      - validate_input_structure
      - inventory_sources
      - summarize_readiness
      - block_if_missing_required_inputs
