# Project-scoped Codex MCP registration for this factory.
# `setup-dev.ps1` / `setup-dev.sh` render this file to `.codex/config.toml`
# using the Python launcher available on the host.
# Keep this template limited to factory MCP servers only.

[mcp_servers.oci_medallion_migration_intake]
command = "__CODEX_PYTHON_COMMAND__"
args = [__CODEX_BRIDGE_PREFIX_ARGS__, "--server", "migration-intake-mcp"]

[mcp_servers.oci_medallion_iam]
command = "__CODEX_PYTHON_COMMAND__"
args = [__CODEX_BRIDGE_PREFIX_ARGS__, "--server", "oci-iam-mcp"]

