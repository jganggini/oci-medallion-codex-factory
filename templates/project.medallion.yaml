project_id: sample-project
domain: generic-domain
environment: dev
network_mode: public
deployment_scope: end_to_end_gold
delivery_target: gold_adb
migration_input_root: workspace/migration-input/sample-project

sql_sources:
  - sql/

script_sources:
  - scripts/

data_sources:
  - data/
  - samples/
  - exports/

doc_sources:
  - docs/
  - notes/

sample_sources:
  - samples/
  - exports/

reference_doc_sources:
  - references/

provisioning_order:
  - compartment
  - iam_policies
  - storage_layers
  - autonomous
  - network
  - landing_ingestion
  - data_flow
  - data_integration
  - validation

pending_input_deliveries: []

target_layers:
  landing_external: true
  bronze_raw: true
  silver_trusted: true
  gold_refined: true
  gold_adb: true

existing_buckets:
  - name: bucket-sample-landing
    exists: false
    layer: landing_external
    managed_by_factory: false
    ingestion_outside_flow: true

source_assets:
  - name: sample-landing-asset
    type: object_storage
    exists: false
    layer: landing_external
    uri: oci://bucket-sample-landing@namespace/source_system=sample/
    managed_by_factory: false
    ingestion_outside_flow: true

iam_baseline:
  enabled: true
  operator_group_name: grp-medallion-operators-dev
  dataflow_admin_group_name: grp-dataflow-admin-dev
  workspace_ocid: ocid1.disworkspace.oc1..replace-me
  catalog_ocid: ocid1.datacatalog.oc1..replace-me
  dynamic_groups:
    autonomous_resource_principal:
      name: dg-adb-resource-principal-dev
      matching_rule: ALL {resource.type = 'autonomousdatabase', resource.compartment.id = 'ocid1.compartment.oc1..replace-me'}
    data_catalog_harvest:
      name: dg-data-catalog-harvest-dev
      matching_rule: Any {resource.id = 'ocid1.datacatalog.oc1..replace-me'}
  policy_bundles:
    operators:
      name: plc-medallion-operators-dev
      statements:
        - Allow group grp-medallion-operators-dev to inspect compartments in tenancy
        - Allow group grp-medallion-operators-dev to manage buckets in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage objects in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage autonomous-database-family in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to use virtual-network-family in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage dataflow-family in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage dis-family in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage data-catalog-family in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage data-catalog-private-endpoints in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage vaults in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage secret-family in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to read log-groups in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to read log-content in compartment data-medallion-dev
        - Allow group grp-medallion-operators-dev to manage work-requests in compartment data-medallion-dev
    dataflow_private_access:
      name: plc-dataflow-admin-dev
      statements:
        - Allow group grp-dataflow-admin-dev to inspect compartments in tenancy
        - Allow group grp-dataflow-admin-dev to manage dataflow-family in compartment data-medallion-dev
        - Allow group grp-dataflow-admin-dev to manage dataflow-private-endpoints in compartment data-medallion-dev
        - Allow group grp-dataflow-admin-dev to use virtual-network-family in compartment data-medallion-dev
        - Allow group grp-dataflow-admin-dev to read objectstorage-namespaces in tenancy
        - Allow group grp-dataflow-admin-dev to read buckets in compartment data-medallion-dev
        - Allow group grp-dataflow-admin-dev to manage objects in compartment data-medallion-dev
        - Allow group grp-dataflow-admin-dev to read log-groups in compartment data-medallion-dev
        - Allow group grp-dataflow-admin-dev to use log-content in compartment data-medallion-dev
    adb_resource_principal:
      name: plc-adb-resource-principal-dev
      statements:
        - Allow dynamic-group dg-adb-resource-principal-dev to read object-family in compartment data-medallion-dev
        - Allow dynamic-group dg-adb-resource-principal-dev to read secret-family in compartment data-medallion-dev
        - Allow dynamic-group dg-adb-resource-principal-dev to use key-delegate-family in compartment data-medallion-dev
    data_integration_workspace:
      name: plc-di-workspace-runtime-dev
      statements:
        - Allow any-user to use virtual-network-family in compartment data-medallion-dev where all {request.principal.type='disworkspace', request.principal.id='ocid1.disworkspace.oc1..replace-me'}
        - Allow any-user to use secret-family in compartment data-medallion-dev where all {request.principal.type='disworkspace', request.principal.id='ocid1.disworkspace.oc1..replace-me'}
        - Allow any-user to read secret-bundles in compartment data-medallion-dev where all {request.principal.type='disworkspace', request.principal.id='ocid1.disworkspace.oc1..replace-me'}
        - Allow any-user to read objectstorage-namespaces in compartment data-medallion-dev where all {request.principal.type='disworkspace', request.principal.id='ocid1.disworkspace.oc1..replace-me'}
        - Allow any-user to manage objects in compartment data-medallion-dev where all {request.principal.type='disworkspace', request.principal.id='ocid1.disworkspace.oc1..replace-me'}
    data_catalog_harvest:
      name: plc-data-catalog-harvest-dev
      statements:
        - Allow dynamic-group dg-data-catalog-harvest-dev to read object-family in compartment data-medallion-dev
        - Allow dynamic-group dg-data-catalog-harvest-dev to read dis-workspaces-lineage in compartment data-medallion-dev
        - Allow any-user to manage data-catalog-data-assets in compartment data-medallion-dev where all {request.principal.type='dataflowrun', target.catalog.id='ocid1.datacatalog.oc1..replace-me', target.resource.kind='dataFlow'}

network_profile:
  compartment_strategy: by-environment
  compartment_name: data-medallion-dev
  compartment_id: ocid1.compartment.oc1..replace-me
  vcn_name: vcn-data-medallion-dev
  shared_vcn_per_environment: true
  subnet_strategy: shared-vcn-public-subnets
  route_table_name: rt-data-medallion-dev
  service_gateway_name: sgw-data-medallion-dev
  internet_gateway_name: igw-data-medallion-dev
  nat_gateway_name: nat-data-medallion-dev
  object_storage_via_service_gateway: true
  data_integration_workspace_private: false
  autonomous_public_access_enabled: true
  subnets:
    data_integration:
      name: subnet-di-dev
      dns_label: disubnet
    data_flow:
      name: subnet-dataflow-dev
      dns_label: dfsubnet
    autonomous:
      name: subnet-autonomous-dev
      dns_label: adbsubnet
  private_endpoints:
    data_flow: false
    autonomous: false
    data_catalog: false
  nsgs:
    - nsg-private-services-dev

control_plane:
  enabled: true
  database_name: adb_sample_gold
  schema_name: MDL_CTL
  control_user: MDL_CTL
  source_type: object_storage
  partition_pattern: source_system={source_system}/entity={entity}/business_date={business_date}/batch_id={batch_id}
  default_reprocess_granularity: run+slice
  technical_columns:
    bronze:
      - _source_system
      - _source_uri
      - _ingest_ts
      - _workflow_id
      - _run_id
      - _slice_key
    silver:
      - _workflow_id
      - _run_id
      - _slice_key
      - _source_uri
      - _record_hash
      - _ingest_ts
      - _dq_status
    gold:
      - _published_run_id
      - _valid_from
      - _valid_to
      - _is_current

autonomous_profile:
  enabled: true
  database_name: adb_sample_gold
  database_user: app_gold
  wallet_dir: .local/autonomous/wallets/dev/adb_sample_gold
  private_endpoint_label: null
  private_access_required: false
  public_access_enabled: true
  bootstrap_runner_requires_private_network_access: false
  load_strategy: single-writer-batch
  cold_history_strategy: hybrid-partitioned
  publish_objects:
    - agg_sample_resumen

dataflow_jobs:
  - name: landing_to_bronze
    enabled: true
    layer_from: landing_external
    layer_to: bronze_raw
  - name: bronze_to_silver
    enabled: true
    layer_from: bronze_raw
    layer_to: silver_trusted
  - name: silver_to_gold
    enabled: true
    layer_from: silver_trusted
    layer_to: gold_refined
  - name: gold_loader
    enabled: true
    target: gold_adb
    delivery_mode: bucket_to_adb
    source_layer: gold_refined
    file_uri_template: oci://bucket-gold-refined@namespace/projects/sample-project/exports/agg_sample_resumen/process_date={business_date}/*.csv
    load_procedure: APP_GOLD.LOAD_AGG_SAMPLE_RESUMEN

di_pipeline:
  enabled: true
  workspace_name: di-medallion-dev
  application: medallion-orchestrator
  private_workspace: false
  sync_lineage_with_data_catalog: true

data_catalog:
  enabled: true
  catalog_name: dc-medallion-dev
  private_endpoint_required: false
  harvest_object_storage: true
  harvest_autonomous_database: true
  sync_data_integration: true

lineage:
  strategy: hybrid
  native_sources:
    - data_flow
    - data_integration
  custom_openlineage:
    enabled: true
    namespace: oci-medallion.dev.sample-project
    provider_key: oci-medallion-codex-factory
    publish_for:
      - adb_sql
      - dbms_cloud_load
      - custom_transform
      - reprocess_event

reprocess:
  enabled: true
  default_scope: run+slice
  supported_keys:
    - entity
    - business_date
    - batch_id
    - object_name
  checkpoint_reuse: true
  allow_row_level_repair: false

quality_profile:
  enabled: true
  contracts_root: workspace/migration-input/sample-project/quality/contracts
  sql_checks_root: workspace/migration-input/sample-project/quality/sql
  gate_before_cutover: true
  gate_severity_threshold: high
  enforce_by_slice: true

validation_rules:
  require_sql: true
  require_docs: true
  require_samples_or_exports: true
  require_ddl: false
  require_mappings: false
  require_control_plane: true
  require_lineage_strategy: true

approvals:
  provisioning_required: true
  publish_required: true
  ddl_required: true
  lineage_required: true
